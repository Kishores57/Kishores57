<svg width="1000" height="320" viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a20"/>
      <stop offset="45%" stop-color="#15303c"/>
      <stop offset="100%" stop-color="#1f4451"/>
    </linearGradient>
    <radialGradient id="orb1" cx="15%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="90%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#B388FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#B388FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00F0FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurOrb"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="320" rx="36" fill="url(#bg)"/>
  <circle cx="150" cy="60" r="200" fill="url(#orb1)" filter="url(#blurOrb)"/>
  <circle cx="880" cy="260" r="220" fill="url(#orb2)" filter="url(#blurOrb)"/>

  <rect x="3" y="3" width="994" height="314" rx="33" fill="url(#glass)" stroke="#00F0FF" stroke-opacity="0.45" stroke-width="2"/>
  <rect x="20" y="20" width="960" height="280" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>

  <text x="500.0" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#F2FEFF" text-anchor="middle" letter-spacing="2" filter="url(#softglow)">KISHOR SURWADE</text>

  <rect x="220.0" y="180" width="560" height="2" rx="1" fill="url(#glow)"/>

  <text x="500.0" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="500" fill="#9FEFFF" text-anchor="middle">Full Stack Developer  •  AI/ML Enthusiast  •  Hackathon Builder</text>

  <text x="500.0" y="268" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#7FD8E8" fill-opacity="0.75" text-anchor="middle" letter-spacing="3">COMPUTER ENGINEERING  ·  K. K. WAGH IEER  ·  SPPU</text>
</svg>